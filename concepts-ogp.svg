<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07070f"/>
      <stop offset="100%" stop-color="#12121e"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6ff5"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7c6ff5"/>
      <stop offset="50%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#fb923c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>

  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="180" fill="rgba(124,111,245,0.08)"/>
  <circle cx="1100" cy="530" r="200" fill="rgba(96,165,250,0.06)"/>

  <!-- Top gradient bar -->
  <rect width="1200" height="6" fill="url(#barGrad)"/>
  <circle cx="600" cy="210" r="90" fill="rgba(124,111,245,0.12)"/>

  <!-- Title -->
  <text x="600" y="365" font-size="68" font-weight="900" text-anchor="middle" fill="url(#titleGrad)" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif">Claude Code 概念マップ</text>

  <!-- Subtitle -->
  <text x="600" y="455" font-size="34" text-anchor="middle" fill="#f0f0fa" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif">開発の流れ × 必要な知識マップ</text>
  <text x="600" y="528" font-size="26" text-anchor="middle" fill="#6868a0" font-family="-apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic UI', sans-serif">全14概念を図解で学ぶ  無料学習ページ</text>

  <!-- Bottom bar -->
  <rect y="624" width="1200" height="6" fill="url(#barGrad)"/>
</svg>
